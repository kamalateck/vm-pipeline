name: Application CD Pipeline


on:

  push:

    branches:

      - main



permissions:

  contents: read



env:

  IMAGE_TAG: ${{ github.run_number }}

  PREVIOUS_IMAGE_TAG: ${{ github.run_number - 1 }}



jobs:



# =====================================================
# DEV DEPLOYMENT
# =====================================================


  deploy-dev:


    name: Deploy Application DEV


    runs-on: ubuntu-latest


    environment:

      name: dev



    steps:


    - name: Checkout Code

      uses: actions/checkout@v4






    - name: Authenticate DEV Google Cloud


      uses: google-github-actions/auth@v2


      with:


        credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_DEV }}







    - name: Configure Docker Authentication


      run: |


        gcloud auth configure-docker \
        ${{ vars.REGION }}-docker.pkg.dev \
        --quiet







    - name: Build Docker Image


      run: |


        docker build \
        -t ${{ vars.DEV_IMAGE_PATH }}:${{ env.IMAGE_TAG }} .







    - name: Push Image To DEV Artifact Registry


      run:


        docker push \
        ${{ vars.DEV_IMAGE_PATH }}:${{ env.IMAGE_TAG }}








    - name: Deploy DEV VM


      uses: appleboy/ssh-action@v1.2.0


      with:


        host: ${{ vars.DEV_VM_IP }}


        username: ${{ vars.DEV_VM_USER }}


        key: ${{ secrets.VM_SSH_KEY }}



        script: |


          echo "Stopping old container"



          docker stop ${{ vars.IMAGE_NAME }} || true


          docker rm ${{ vars.IMAGE_NAME }} || true




          echo "Pulling new image"



          docker pull \
          ${{ vars.DEV_IMAGE_PATH }}:${{ env.IMAGE_TAG }}






          echo "Starting application"



          docker run -d \
          --restart always \
          -p 8000:8000 \
          --name ${{ vars.IMAGE_NAME }} \
          ${{ vars.DEV_IMAGE_PATH }}:${{ env.IMAGE_TAG }}








    - name: DEV Health Check


      run:


        sleep 20


        curl -f http://${{ vars.DEV_VM_IP }}:8000







# =====================================================
# DEV ROLLBACK
# =====================================================


    - name: Rollback DEV


      if: failure()


      uses: appleboy/ssh-action@v1.2.0


      with:


        host: ${{ vars.DEV_VM_IP }}


        username: ${{ vars.DEV_VM_USER }}


        key: ${{ secrets.VM_SSH_KEY }}



        script: |


          echo "Rollback started"




          docker stop ${{ vars.IMAGE_NAME }} || true


          docker rm ${{ vars.IMAGE_NAME }} || true






          docker pull \
          ${{ vars.DEV_IMAGE_PATH }}:${{ env.PREVIOUS_IMAGE_TAG }}







          docker run -d \
          --restart always \
          -p 8000:8000 \
          --name ${{ vars.IMAGE_NAME }} \
          ${{ vars.DEV_IMAGE_PATH }}:${{ env.PREVIOUS_IMAGE_TAG }}






# =====================================================
# UAT DEPLOYMENT
# =====================================================


  deploy-uat:


    name: Deploy Application UAT



    needs:

      - deploy-dev



    runs-on: ubuntu-latest



    environment:

      name: uat



    steps:



    - name: Checkout Code


      uses: actions/checkout@v4






    - name: Authenticate UAT Google Cloud


      uses: google-github-actions/auth@v2


      with:


        credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_UAT }}








    - name: Configure Docker Authentication


      run:


        gcloud auth configure-docker \
        ${{ vars.REGION }}-docker.pkg.dev \
        --quiet







    - name: Promote Image DEV To UAT


      run: |


        docker pull \
        ${{ vars.DEV_IMAGE_PATH }}:${{ env.IMAGE_TAG }}






        docker tag \
        ${{ vars.DEV_IMAGE_PATH }}:${{ env.IMAGE_TAG }} \
        ${{ vars.UAT_IMAGE_PATH }}:${{ env.IMAGE_TAG }}






        docker push \
        ${{ vars.UAT_IMAGE_PATH }}:${{ env.IMAGE_TAG }}








    - name: Deploy UAT VM


      uses: appleboy/ssh-action@v1.2.0


      with:


        host: ${{ vars.UAT_VM_IP }}


        username: ${{ vars.UAT_VM_USER }}


        key: ${{ secrets.VM_UAT_SSH_KEY }}



        script: |



          echo "Stopping old UAT container"



          docker stop ${{ vars.IMAGE_NAME }} || true


          docker rm ${{ vars.IMAGE_NAME }} || true






          docker pull \
          ${{ vars.UAT_IMAGE_PATH }}:${{ env.IMAGE_TAG }}







          docker run -d \
          --restart always \
          -p 8000:8000 \
          --name ${{ vars.IMAGE_NAME }} \
          ${{ vars.UAT_IMAGE_PATH }}:${{ env.IMAGE_TAG }}








    - name: UAT Health Check


      run:


        sleep 20


        curl -f http://${{ vars.UAT_VM_IP }}:8000
